# AnyGen Finance Report — 输出配置
# 用户安装后可自行修改此文件

language: en-US                 # zh-CN | en-US

brand:
  name: "AnyGen Research"       # 报告中显示的品牌名
  subtitle: "Equity Research"   # 报告副标题
  accent_color: "#0d1b3e"       # 品牌主色

pdf:
  engine: chromium              # chromium | weasyprint | wkhtmltopdf
  flags: "--headless --no-sandbox --disable-gpu --print-to-pdf-no-header --no-pdf-header-footer"

# 报告存放位置
# ⚠️ 必须在 OpenClaw workspace 下，否则 MEDIA: 发送会被拦截
# OpenClaw 只允许发送 workspace 目录下的文件（LocalMediaAccessError）
output:
  # 相对于 OpenClaw workspace 根目录（~/.openclaw/workspace/）
  report_dir: reports
  filename_pattern: "anygen-{symbol}-{type}-{date}.pdf"

# 报告中的固定文本
disclaimer: "This report is generated by AnyGen AI Research Engine for reference only. It does not constitute investment advice."

# ═══════════════════════════════════════════
# PDF发送规则（给AI看的，必须严格遵守）:
# ═══════════════════════════════════════════
#
# 1. 生成PDF到 OpenClaw workspace 下: ~/.openclaw/workspace/{report_dir}/
#    - ❌ 不要输出到 ~/reports/（不在允许目录内，MEDIA:会失败）
#    - ✅ 输出到 ~/.openclaw/workspace/reports/
#
# 2. 发送时使用文件的绝对路径
#
# 3. OpenClaw平台发送方式: MEDIA:/absolute/path/to/file.pdf
#
# ⚠️ 关键规则：MEDIA: 指令必须在一条【极短的独立消息】中发送！
#    - 正确做法：先发分析结论文字，然后单独发一条只含 MEDIA: 的消息
#    - 错误做法：把 MEDIA: 混在大段分析文字中间（会导致解析失败）
#
#    ✅ 正确示例（分两条消息）：
#       消息1: "NVDA财报分析报告已生成。"
#       消息2: "MEDIA:/home/user/.openclaw/workspace/reports/anygen-NVDA-earnings-2026-03-04.pdf"
#
#    ❌ 错误示例：
#       - 把 MEDIA: 混在大段分析文字中间（会导致解析失败）
#       - 输出到 ~/reports/（LocalMediaAccessError）
#
# 4. 不硬编码任何用户路径，用 os.path.expanduser("~") 拼接
